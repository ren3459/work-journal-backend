services:
  postgres:
    image: postgres:16
    container_name: work-journal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alice
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: work_journal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
